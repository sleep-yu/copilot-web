name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync openssh-client

      - name: Deploy to server via rsync
        env:
          RSYNC_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          # 添加 SSH key 到 ssh-agent
          mkdir -p ~/.ssh
          echo "$RSYNC_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          # 同步源码到服务器（排除 node_modules 和 dist）
          rsync -az --exclude='.git' --exclude='node_modules' --exclude='dist' --exclude='.github' \
            -e "ssh -p ${{ secrets.SERVER_PORT }}" \
            ./ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/www/wwwroot/copilot-web/
          # 在服务器上安装依赖并构建
          ssh -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            'export PATH="/usr/local/bin:/usr/bin:$HOME/.nvm/versions/node/v20.18.0/bin:$PATH" && \
             cd /www/wwwroot/copilot-web && \
             npm install && \
             npm run build && \
             echo "Frontend deployed successfully!"'
