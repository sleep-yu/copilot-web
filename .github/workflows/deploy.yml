name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Package source code
        run: zip -r copilot-web.zip . -x ".git/*" -x "node_modules/*" -x "dist/*" -x "copilot-web.zip"

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          timeout: 5m
          upload_files: |
            copilot-web.zip
          target: /www/wwwroot/copilot-web/
          command: |
            set -x
            export PATH="/usr/local/bin:/usr/bin:$HOME/.nvm/versions/node/v20.18.0/bin:$PATH"
            cd /www/wwwroot/copilot-web
            pwd
            ls -la copilot-web.zip 2>/dev/null && echo "ZIP_EXISTS" || echo "ZIP_MISSING"
            if [ -f copilot-web.zip ]; then
              echo "Extracting zip..."
              unzip -o copilot-web.zip && echo "UNZIP_SUCCESS" || echo "UNZIP_FAILED"
              rm -f copilot-web.zip
            fi
            ls src/pages/Login.tsx 2>/dev/null && grep '<h1>' src/pages/Login.tsx || echo "FILE_MISSING"
            npm install 2>&1 | tail -3
            npm run build 2>&1 | tail -5
            echo "DEPLOY_DONE"
