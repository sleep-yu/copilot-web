name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  test-scp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo '${{ secrets.SERVER_SSH_KEY }}' > ~/.ssh/ssh_key
          chmod 600 ~/.ssh/ssh_key
          ssh-keyscan -H -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Test scp
        run: |
          echo "hello world" > /tmp/test.txt
          scp -P ${{ secrets.SERVER_PORT }} -o StrictHostKeyChecking=no \
            /tmp/test.txt ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/test.txt
          echo "SCP_TEST_SUCCESS"
