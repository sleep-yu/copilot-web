name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Package source
        run: |
          tar --exclude='.git' --exclude='node_modules' --exclude='dist' --exclude='.github' -czf - . | base64 > /tmp/src.b64

      - name: Deploy via SSH pipe
        run: |
          echo '${{ secrets.SERVER_SSH_KEY }}' | ssh -T -p ${{ secrets.SERVER_PORT }} \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            -o "StrictHostKeyChecking=no" \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            'cd /www/wwwroot/copilot-web && cat > /tmp/src.b64 && base64 -d /tmp/src.b64 | tar -xzf - --strip-components=1 && rm -f /tmp/src.b64 && npm install && npm run build && echo done'
        env:
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
