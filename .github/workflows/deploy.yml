name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Package source code
        run: |
          tar --exclude='.git' --exclude='node_modules' --exclude='dist' --exclude='.github' \
            -czf copilot-web-src.tar.gz .

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          timeout: 5m
          upload_files: |
            copilot-web-src.tar.gz
          target: /www/wwwroot/copilot-web/
          command: |
            cd /www/wwwroot/copilot-web
            ls -la copilot-web-src.tar.gz
            tar -xzf copilot-web-src.tar.gz --strip-components=1
            rm -f copilot-web-src.tar.gz
            export PATH="/usr/local/bin:/usr/bin"
            npm install
            npm run build
            echo "Frontend deployed successfully!"
