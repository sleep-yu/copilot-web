name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo '${{ secrets.SERVER_SSH_KEY }}' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          ssh -p ${{ secrets.SERVER_PORT }} -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'echo SSH_OK'
        env:
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}

      - name: Package source
        run: |
          tar --exclude='.git' --exclude='node_modules' --exclude='dist' --exclude='.github' -czf - . | base64 > /tmp/src.b64

      - name: Transfer source to server
        run: |
          # 分两步：1. 先把文件 scp 过去
          scp -P ${{ secrets.SERVER_PORT }} -o StrictHostKeyChecking=no /tmp/src.b64 \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/src.b64
          echo "Transfer complete"

      - name: Extract and build on server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          timeout: 5m
          command: |
            export PATH="/usr/local/node-v20.19.0-linux-x64/bin:/usr/local/bin:/usr/bin"
            cd /www/wwwroot/copilot-web
            base64 -d /tmp/src.b64 | tar -xzf - --strip-components=1
            rm -f /tmp/src.b64
            npm install
            npm run build
            echo "Frontend deployed successfully!"
