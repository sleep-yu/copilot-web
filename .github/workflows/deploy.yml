name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Package source code
        run: zip -r copilot-web.zip . -x ".git/*" -x "node_modules/*" -x "dist/*" -x "copilot-web.zip"

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          timeout: 5m
          upload_files: |
            copilot-web.zip
          target: /www/wwwroot/copilot-web/
          command: |
            export PATH="/usr/local/bin:/usr/bin:$HOME/.nvm/versions/node/v20.18.0/bin:$PATH"
            cd /www/wwwroot/copilot-web
            # 删除旧源码（保留 .git 和 dist）
            find . -maxdepth 1 -not -name '.git' -not -name 'dist' -not -name '.' | xargs rm -rf 2>/dev/null || true
            # 解压覆盖
            unzip -o copilot-web.zip
            rm -f copilot-web.zip
            # 安装依赖（node_modules 在 zip 中被排除，需重新安装）
            npm install
            # 构建
            npm run build
            echo "Frontend deployed successfully!"
