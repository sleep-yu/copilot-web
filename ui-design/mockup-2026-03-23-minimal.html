<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copilot - AI Assistant</title>
  <style>
    /* ============================================
       Design Tokens - Minimalist Style
       ============================================ */
    :root {
      /* Light Theme - Clean & Bright */
      --bg-primary: #ffffff;
      --bg-secondary: #f8f9fa;
      --bg-tertiary: #f1f3f5;
      --bg-input: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --border-color: #e5e7eb;
      --accent-color: #10b981;
      --accent-light: #d1fae5;
      --accent-hover: #059669;
      
      /* Spacing */
      --sidebar-width: 0px;
      --content-max-width: 800px;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      
      /* Shadows - Soft */
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    [data-theme="dark"] {
      /* Dark Theme - Soft & Muted */
      --bg-primary: #0f0f0f;
      --bg-secondary: #18181b;
      --bg-tertiary: #27272a;
      --bg-input: #1f1f23;
      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --border-color: #27272a;
      --accent-color: #34d399;
      --accent-light: #064e3b;
      --accent-hover: #10b981;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    /* ============================================
       Reset & Base
       ============================================ */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.5;
    }

    /* ============================================
       App Layout - Single Column
       ============================================ */
    .app-container {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* ============================================
       Header - Minimal Top Bar
       ============================================ */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent-color) 0%, var(--accent-hover) 100%);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .header-logo svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    .header-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: transparent;
      border: none;
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .header-btn:hover {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    .header-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 1.5;
      fill: none;
    }

    /* ============================================
       Main Content Area
       ============================================ */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding-top: 56px;
      height: 100vh;
    }

    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: var(--content-max-width);
      width: 100%;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ============================================
       Messages Area
       ============================================ */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 32px 0;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Empty State - Centered & Minimal */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 20px;
      min-height: 400px;
    }

    .empty-icon {
      width: 56px;
      height: 56px;
      background: var(--accent-light);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      color: var(--accent-color);
    }

    .empty-icon svg {
      width: 28px;
      height: 28px;
      fill: currentColor;
    }

    .empty-state h2 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }

    .empty-state p {
      font-size: 14px;
      color: var(--text-secondary);
      max-width: 320px;
      line-height: 1.6;
    }

    /* ============================================
       Message Bubbles - Clean & Simple
       ============================================ */
    .message {
      display: flex;
      gap: 16px;
      max-width: 100%;
      animation: messageIn 0.3s ease-out;
    }

    @keyframes messageIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .message-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
    }

    .message.user .message-avatar {
      background: var(--accent-color);
      border: none;
      color: white;
    }

    .message.assistant .message-avatar {
      background: linear-gradient(135deg, var(--accent-color) 0%, var(--accent-hover) 100%);
      border: none;
      color: white;
    }

    .message-avatar svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .message-content {
      flex: 1;
      max-width: calc(100% - 56px);
    }

    .message.user .message-content {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .message-bubble {
      padding: 12px 16px;
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-color);
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-primary);
    }

    .message.user .message-bubble {
      background: var(--accent-color);
      border: none;
      color: white;
    }

    .message-bubble p {
      margin: 0 0 8px 0;
    }

    .message-bubble p:last-child {
      margin-bottom: 0;
    }

    .message-bubble code {
      font-family: "SF Mono", "Fira Code", Monaco, monospace;
      font-size: 13px;
      background: rgba(0, 0, 0, 0.06);
      padding: 2px 6px;
      border-radius: 4px;
    }

    [data-theme="dark"] .message-bubble code {
      background: rgba(255, 255, 255, 0.1);
    }

    .message.user .message-bubble code {
      background: rgba(255, 255, 255, 0.2);
    }

    .message-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      padding: 0 4px;
    }

    /* ============================================
       Loading Indicator - Typing Dots
       ============================================ */
    .typing-indicator {
      display: flex;
      gap: 16px;
      padding: 8px 0;
    }

    .typing-dots {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
    }

    .typing-dots span {
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: typing 1.4s infinite ease-in-out;
    }

    .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
    .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
    .typing-dots span:nth-child(3) { animation-delay: 0; }

    @keyframes typing {
      0%, 80%, 100% {
        transform: scale(0.8);
        opacity: 0.5;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* ============================================
       Input Area - Floating Style
       ============================================ */
    .input-area {
      padding: 16px 0 32px;
    }

    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      padding: 12px 12px 12px 16px;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
      transition: all 0.2s ease;
    }

    .input-wrapper:focus-within {
      border-color: var(--accent-color);
      box-shadow: var(--shadow-lg), 0 0 0 3px var(--accent-light);
    }

    .input-wrapper textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 15px;
      line-height: 1.5;
      color: var(--text-primary);
      resize: none;
      min-height: 24px;
      max-height: 150px;
      padding: 0;
    }

    .input-wrapper textarea::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: var(--accent-color);
      border: none;
      border-radius: var(--radius-md);
      color: white;
      cursor: pointer;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }

    .send-btn:hover:not(:disabled) {
      background: var(--accent-hover);
      transform: scale(1.05);
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .send-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .input-hint {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 12px;
    }

    /* ============================================
       Sidebar - Hidden by Default (Optional)
       ============================================ */
    .sidebar {
      display: none;
    }

    /* ============================================
       Theme Switcher - Minimal
       ============================================ */
    .theme-switcher {
      position: fixed;
      bottom: 20px;
      right: 20px;
      display: flex;
      gap: 4px;
      padding: 4px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      z-index: 100;
    }

    .theme-switcher button {
      padding: 8px 14px;
      background: transparent;
      border: none;
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .theme-switcher button:hover {
      color: var(--text-primary);
    }

    .theme-switcher button.active {
      background: var(--bg-primary);
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
    }

    /* ============================================
       Responsive
       ============================================ */
    @media (max-width: 768px) {
      .chat-container {
        padding: 0 16px;
      }

      .messages-area {
        padding: 24px 0;
        gap: 20px;
      }

      .message-bubble {
        padding: 10px 14px;
        font-size: 14px;
      }

      .input-area {
        padding: 12px 0 24px;
      }

      .empty-state {
        padding: 40px 16px;
        min-height: 300px;
      }

      .empty-icon {
        width: 48px;
        height: 48px;
        margin-bottom: 20px;
      }

      .empty-icon svg {
        width: 24px;
        height: 24px;
      }

      .empty-state h2 {
        font-size: 18px;
      }

      .theme-switcher {
        bottom: 100px;
        right: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="header">
      <div class="header-brand">
        <div class="header-logo">
          <svg viewBox="0 0 24 24">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
        </div>
        <span class="header-title">Copilot</span>
      </div>
      <div class="header-actions">
        <button class="header-btn" title="深色/浅色">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <div class="chat-container">
        <!-- Messages Area -->
        <div class="messages-area">
          <!-- Empty State -->
          <div class="empty-state">
            <div class="empty-icon">
              <svg viewBox="0 0 24 24">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
              </svg>
            </div>
            <h2>开始对话</h2>
            <p>输入你的问题，AI 助手会帮你解答</p>
          </div>

          <!-- Example Messages (for demo) -->
          <div class="message user">
            <div class="message-avatar">
              <svg viewBox="0 0 24 24">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
            <div class="message-content">
              <div class="message-bubble">
                <p>什么是 React 的 useState Hook？</p>
              </div>
              <span class="message-time">下午 9:45</span>
            </div>
          </div>

          <div class="message assistant">
            <div class="message-avatar">
              <svg viewBox="0 0 24 24">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
              </svg>
            </div>
            <div class="message-content">
              <div class="message-bubble">
                <p><strong>useState</strong> 是 React 中的一个 Hook，用于在函数组件中添加状态。</p>
                <p>基本语法：</p>
                <p><code>const [state, setState] = useState(initialValue);</code></p>
                <p>每当状态更新时，组件会重新渲染。</p>
              </div>
              <span class="message-time">下午 9:45</span>
            </div>
          </div>

          <!-- Typing Indicator -->
          <div class="typing-indicator" style="display: none;">
            <div class="message-avatar">
              <svg viewBox="0 0 24 24">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
              </svg>
            </div>
            <div class="typing-dots">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
          <div class="input-wrapper">
            <textarea placeholder="输入消息..." rows="1"></textarea>
            <button class="send-btn">
              <svg viewBox="0 0 24 24">
                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
              </svg>
            </button>
          </div>
          <p class="input-hint">按 Enter 发送，Shift + Enter 换行</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Theme Switcher -->
  <div class="theme-switcher">
    <button class="active" onclick="setTheme('light')">浅色</button>
    <button onclick="setTheme('dark')">深色</button>
  </div>

  <script>
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.querySelectorAll('.theme-switcher button').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');
    }
  </script>
</body>
</html>
